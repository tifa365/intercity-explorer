<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Germany Transport Map 2026</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      overflow: hidden;
      background: #ffffff;
      font-family: "Avenir Next", "Helvetica Neue", "Arial Nova", sans-serif;
      color: #171717;
    }

    body { width: 100vw; height: 100vh; }

    #map-shell {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #map-frame {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
    }

    #map {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* ── SVG canvas ── */
    .network-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ── Station hit circles ── */
    .station-hit {
      fill: transparent;
      stroke: transparent;
      /* stroke stays at a fixed screen-pixel width regardless of zoom */
      vector-effect: non-scaling-stroke;
      stroke-width: 2;
      cursor: pointer;
      transition: fill 120ms ease, stroke 120ms ease;
    }

    .station-hit:hover {
      fill: rgba(255, 140, 0, 0.15);
      stroke: rgba(255, 140, 0, 0.8);
    }

    /* ── Route label hit circles — same hover style as stations ── */
    .route-label-hit {
      fill: transparent;
      stroke: transparent;
      vector-effect: non-scaling-stroke;
      stroke-width: 2;
      cursor: pointer;
      transition: fill 120ms ease, stroke 120ms ease;
    }

    .route-label-hit:hover {
      fill: rgba(60, 150, 240, 0.15);
      stroke: rgba(60, 150, 240, 0.8);
    }

    /* Route popup: show route links, hide station-only links */
    #popup[data-mode="route"] #link-bf,
    #popup[data-mode="route"] #link-dbf,
    #popup[data-mode="route"] #link-wd,
    #popup[data-mode="route"] #link-wp,

    /* ── HUD ── */
    #hud {
      position: absolute;
      top: 18px;
      left: 18px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
      z-index: 600;
    }

    #hud-bottom {
      position: absolute;
      bottom: 18px;
      left: 18px;
      display: flex;
      align-items: center;
      gap: 6px;
      pointer-events: none;
      z-index: 600;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 7px 13px;
      border: 1px solid rgba(23, 23, 23, 0.1);
      border-radius: 999px;
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 4px 16px rgba(23, 23, 23, 0.08);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 11px;
      font-weight: 700;
    }

    .hud-btn {
      pointer-events: all;
      cursor: pointer;
      appearance: none;
      border: 1px solid rgba(23, 23, 23, 0.15);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 14px rgba(23, 23, 23, 0.1);
      padding: 7px 13px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #171717;
      transition: background 160ms ease, box-shadow 160ms ease;
    }

    .hud-btn:hover {
      background: rgba(255, 255, 255, 0.98);
      box-shadow: 0 6px 20px rgba(23, 23, 23, 0.14);
    }

    /* ── Info button ── */
    #info-btn {
      position: absolute;
      top: 18px;
      right: 18px;
      z-index: 600;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid rgba(23, 23, 23, 0.15);
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 14px rgba(23, 23, 23, 0.1);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 160ms ease, box-shadow 160ms ease;
    }
    #info-btn:hover {
      background: rgba(255, 255, 255, 0.98);
      box-shadow: 0 6px 20px rgba(23, 23, 23, 0.14);
    }

    /* ── Info panel ── */
    #info-panel {
      position: absolute;
      top: 58px;
      right: 18px;
      z-index: 700;
      width: 232px;
      background: rgba(255, 255, 255, 0.97);
      border: 1px solid rgba(23, 23, 23, 0.09);
      border-radius: 14px;
      padding: 14px 16px;
      box-shadow: 0 8px 32px rgba(23, 23, 23, 0.18);
      backdrop-filter: blur(16px);
      font-size: 12px;
      line-height: 1.5;
      color: #333;
    }
    #info-panel.hidden { display: none; }

    #info-panel .info-heading {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(23, 23, 23, 0.35);
      margin-bottom: 6px;
    }
    #info-panel .info-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      padding: 3px 0;
    }
    #info-panel .info-label { color: rgba(23, 23, 23, 0.45); flex-shrink: 0; }
    #info-panel .info-val   { font-weight: 600; color: #111; text-align: right; }
    #info-panel hr {
      border: none;
      border-top: 1px solid rgba(23, 23, 23, 0.08);
      margin: 10px 0;
    }
    #info-panel .info-source {
      font-size: 11px;
      color: rgba(23, 23, 23, 0.4);
      margin-bottom: 4px;
    }
    #info-panel .info-link {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 0;
      color: #1a6fd4;
      text-decoration: none;
      font-size: 11.5px;
      font-weight: 500;
      transition: color 120ms ease;
    }
    #info-panel .info-link:hover { color: #0d4fa8; }
    #info-panel .info-footer-note {
      font-size: 10.5px;
      color: rgba(23, 23, 23, 0.3);
      margin-top: 8px;
    }
    .info-dot  { color: #e67e22; font-weight: 700; }
    .info-line { color: #3c96f0; font-weight: 700; }

    /* ── Popup ── */
    #popup {
      position: fixed;
      z-index: 800;
      background: rgba(255, 255, 255, 0.97);
      border: 1px solid rgba(23, 23, 23, 0.09);
      border-radius: 14px;
      padding: 12px 14px 14px;
      box-shadow: 0 8px 32px rgba(23, 23, 23, 0.2), 0 2px 8px rgba(23,23,23,0.08);
      display: flex;
      flex-direction: column;
      gap: 10px;
      backdrop-filter: blur(16px);
      transform: translate(-50%, calc(-100% - 16px));
      pointer-events: all;
      min-width: 200px;
    }

    #popup.hidden { display: none; }

    .popup-header {
      display: flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
    }

    .popup-train-icon { font-size: 16px; flex-shrink: 0; }

    #popup-name {
      font-size: 13px;
      font-weight: 700;
      color: #111;
      flex: 1;
    }

    #popup-close {
      appearance: none;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 13px;
      color: #aaa;
      padding: 0;
      line-height: 1;
      flex-shrink: 0;
      transition: color 120ms ease;
    }

    #popup-close:hover { color: #333; }

    /* ── Icon row ── */
    .popup-icons {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-top: 2px;
      border-top: 1px solid rgba(23, 23, 23, 0.07);
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      flex-shrink: 0;
      transition: transform 200ms cubic-bezier(.34, 1.56, .64, 1),
                  box-shadow 200ms ease;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.22);
    }

    .icon-btn:hover {
      transform: scale(1.13) translateY(-2px);
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.28);
    }

    .icon-btn:active { transform: scale(1.03); }

    .icon-btn.wp  { background: #1a1a1a; }
    .icon-btn.wd  { background: #006699; }
    .icon-btn.dbf { background: #EC0016; }
    .icon-btn.bf  { background: #003082; }
    .icon-btn.zf  { background: #e67e22; }

    .icon-btn img,
    .icon-btn svg { display: block; }

    /* Disabled state — shown while checking or when page not found */
    .icon-btn.disabled {
      opacity: 0.28;
      filter: grayscale(1);
      box-shadow: none;
      pointer-events: none;
      cursor: default;
      transform: none !important;
      transition: opacity 300ms ease, filter 300ms ease;
    }
  </style>
</head>

  <script>
    // ── Station span grouping ────────────────────────────────────────────────
    // The PDF extractor produces one span per typeset line. Multi-line labels
    // ("Frankfurt (Main) / Hbf", "Hermsdorf- / Klosterlausnitz") arrive as
    // separate entries. Merge spans that share the same horizontal column
    // (|cx| < 12 px) and sit on the very next line (dcy 1–11 px), but ONLY
    // when the transition looks like a genuine label continuation:
    //   • previous text ends with '-'      → hyphenated word or compound name
    //   • next text starts with lowercase  → continuation syllable ("münde")
    //   • next text starts with '('        → parenthetical qualifier ("(Main)")
    //   • next text is a known station suffix ("Hbf", "Flughafen", …)
    const STATION_SUFFIXES = new Set(["Hbf", "West", "Ost", "Nord", "Süd", "Mitte", "Flughafen"]);
    const LOCATIVE_PREPS   = new Set(["am", "im", "an", "bei", "ob", "a.", "i."]);

    function isContinuation(prevText, nextText) {
      if (prevText.endsWith("-"))              return true;
      if (nextText[0] !== nextText[0].toUpperCase()) return true; // lowercase start
      if (nextText.startsWith("("))            return true;
      if (STATION_SUFFIXES.has(nextText.trim())) return true;
      const prevWords = prevText.trim().split(/\s+/);
      // Single-word prefix like "Bad", "Lutherstadt", "Schwäbisch" — clearly incomplete
      if (prevWords.length === 1 && !STATION_SUFFIXES.has(prevText.trim())) return true;
      // Locative preposition ending: "Prien am" → "Chiemsee"
      if (LOCATIVE_PREPS.has(prevWords[prevWords.length - 1].toLowerCase())) return true;
      return false;
    }

    function mergeText(prev, next) {
      if (!prev.endsWith("-")) return prev + " " + next;
      // Hyphen: keep it for compound proper nouns (next starts uppercase),
      // remove it for typographic line-break hyphens (next starts lowercase).
      return next[0] === next[0].toLowerCase()
        ? prev.slice(0, -1) + next   // "Warne-" + "münde" → "Warnemünde"
        : prev + next;               // "Hermsdorf-" + "Klosterlausnitz" → "Hermsdorf-Klosterlausnitz"
    }

    function groupStations(spans) {
      const sorted = [...spans].sort((a, b) => a.cy - b.cy || a.cx - b.cx);
      const used = new Set();
      const result = [];

      for (let i = 0; i < sorted.length; i++) {
        if (used.has(i)) continue;
        used.add(i);

        const chain = [sorted[i]];
        let tail = sorted[i];

        let extended = true;
        while (extended) {
          extended = false;
          for (let j = 0; j < sorted.length; j++) {
            if (used.has(j)) continue;
            const b = sorted[j];
            const dcy = b.cy - tail.cy;
            if (Math.abs(tail.cx - b.cx) < 12 && dcy > 0 && dcy < 11
                && isContinuation(tail.text, b.text)) {
              used.add(j);
              chain.push(b);
              tail = b;
              extended = true;
              break;
            }
          }
        }

        let name = chain[0].text;
        for (let k = 1; k < chain.length; k++) {
          name = mergeText(name, chain[k].text);
        }

        const cx = chain.reduce((s, c) => s + c.cx, 0) / chain.length;
        const cy = chain.reduce((s, c) => s + c.cy, 0) / chain.length;
        result.push({ name: name.trim(), cx, cy });
      }

      return result;
    }

    function toSlug(name) {
      return name.toLowerCase()
        .replace(/ä/g, "ae").replace(/ö/g, "oe").replace(/ü/g, "ue").replace(/ß/g, "ss")
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");
    }

    // ── Popup ────────────────────────────────────────────────────────────────
    const popup     = document.getElementById("popup");
    const popupName = document.getElementById("popup-name");
    const linkWp    = document.getElementById("link-wp");
    const linkWd    = document.getElementById("link-wd");
    const linkDbf   = document.getElementById("link-dbf");
    const linkBf    = document.getElementById("link-bf");
    const linkZf    = document.getElementById("link-zf");

    let stationLinks = {};  // populated from station_links.json at load time
    let routeLinks   = {};  // populated from route_links.json at load time

    function showPopup(name, clientX, clientY) {
      popupName.textContent = name;

      const wikiTitle = name.replace(/ /g, "_");
      const encoded   = encodeURIComponent(name);
      const qid       = stationLinks[name];
      linkWp.href  = `https://de.wikipedia.org/wiki/${encodeURIComponent(wikiTitle)}`;
      linkWd.href  = qid
        ? `https://www.wikidata.org/wiki/${qid}`
        : `https://www.wikidata.org/w/index.php?search=${encoded}&language=de&ns0=1`;
      linkDbf.href = `https://dbf.finalrewind.org/${encoded}`;
      linkBf.href  = `https://www.bahnhof.de/${toSlug(name)}`;
      linkZf.href  = `https://www.zugfinder.net/de/bahnhofssuche-${encoded}`;

      popup.style.left = clientX + "px";
      popup.style.top  = clientY + "px";
      popup.classList.remove("hidden");
    }

    function showRoutePopup(names, color, clientX, clientY) {
      const name = names[0] || "";
      popupName.textContent = names.join(" · ") || "Unbekannte Linie";
      document.querySelector(".popup-train-icon").textContent = "🚄";
      popup.dataset.mode = "route";

      const urls = routeLinks[name];
      if (urls) {
        linkZf.href = urls.zugfinder;
      } else {
        const enc = encodeURIComponent(name);
        linkZf.href = `https://www.zugfinder.net/de/zug-${enc.replace(/%20/g, "_")}`;
      }

      popup.style.left = clientX + "px";
      popup.style.top  = clientY + "px";
      popup.classList.remove("hidden");
    }

    function hidePopup() {
      popup.classList.add("hidden");
      document.querySelector(".popup-train-icon").textContent = "🚉";
      popup.dataset.mode = "station";
    }

    document.getElementById("popup-close").addEventListener("click", (e) => {
      e.stopPropagation();
      hidePopup();
    });

    // ── Info panel toggle ────────────────────────────────────────────────────
    const infoPanel = document.getElementById("info-panel");
    document.getElementById("info-btn").addEventListener("click", (e) => {
      e.stopPropagation();
      infoPanel.classList.toggle("hidden");
    });
    document.addEventListener("click", () => infoPanel.classList.add("hidden"));
    infoPanel.addEventListener("click", (e) => e.stopPropagation());

    // ── Load SVG + station data ───────────────────────────────────────────────
    // Requires an HTTP server — d3.xml / d3.json use fetch() which is blocked
    // on file://. Run: python3 -m http.server 8080  then open localhost:8080
    Promise.all([
      d3.xml("germany_map.svg"),
      d3.json("station_names_positions.json"),
      d3.json("station_links.json"),
      d3.json("route_labels.json"),
      d3.json("route_links.json"),
    ]).then(([svgDocument, rawStations, links, routeLabels, rLinks]) => {
      stationLinks = links;
      routeLinks   = rLinks;

      // ── Adopt SVG into the page ──────────────────────────────────────────
      const importedSvg = document.importNode(svgDocument.documentElement, true);
      importedSvg.setAttribute("viewBox", "0 0 1191 1684");
      importedSvg.setAttribute("preserveAspectRatio", "xMidYMid meet");
      importedSvg.removeAttribute("width");
      importedSvg.removeAttribute("height");

      document.getElementById("map").replaceChildren(importedSvg);

      const svg = d3.select(importedSvg).attr("class", "network-canvas");

      // ── Glow filter for hovered station ─────────────────────────────────
      const defs = svg.select("defs");
      defs.append("filter")
        .attr("id", "station-glow")
        .attr("x", "-40%").attr("y", "-40%")
        .attr("width", "180%").attr("height", "180%")
        .html(`<feDropShadow dx="0" dy="0" stdDeviation="3"
                 flood-color="rgba(255,140,0,0.7)" flood-opacity="1"/>`);

      // ── Wrap content in a zoom-shell ────────────────────────────────────
      // The SVG has a single top-level <g> (no transform) that holds all
      // artwork. Move it into zoom-shell so D3 zoom applies to it.
      const topGroup = svg.select(":scope > g");
      const zoomShell = svg.append("g").attr("class", "zoom-shell");
      zoomShell.node().appendChild(topGroup.node());

      // ── Interaction layer ────────────────────────────────────────────────
      // Appended after the artwork so hit circles render on top.
      // No transform needed: our cx/cy are already in SVG viewBox space
      // (y increases downward, matching PyMuPDF's get_text coordinate output).
      const interactionLayer = zoomShell.append("g").attr("class", "interaction-layer");

      // ── Station hit circles ──────────────────────────────────────────────
      const stations = groupStations(rawStations);

      // Target clickable radius in CSS pixels, constant at any zoom level.
      const HIT_PX = 14;

      // The SVG viewBox is 1191×1684. When it scales to fill the container
      // via preserveAspectRatio, 1 SVG unit = svgScale CSS pixels.
      // D3 zoom adds an extra k factor on top. We keep r = HIT_PX / (svgScale × k)
      // so the circle always covers HIT_PX pixels on screen.
      // Cache svgScale — getBoundingClientRect is expensive; only recompute on resize.
      let _svgScale = null;
      function svgScale() {
        if (_svgScale !== null) return _svgScale;
        const r = importedSvg.getBoundingClientRect();
        _svgScale = Math.min(r.width / 1191, r.height / 1684);
        return _svgScale;
      }

      let _lastK = null;
      function updateHitRadii(k) {
        if (k === _lastK) return; // skip if zoom level unchanged (e.g. pure pan)
        _lastK = k;
        const r = HIT_PX / (svgScale() * k);
        interactionLayer.selectAll(".station-hit, .route-label-hit").attr("r", r);
      }

      interactionLayer.selectAll(".station-hit")
        .data(stations)
        .enter()
        .append("circle")
          .attr("class", "station-hit")
          .attr("cx", (d) => d.cx)
          .attr("cy", (d) => d.cy)
          .attr("r", 0) // set properly below
          .attr("data-name", (d) => d.name)
          .on("click", function(event) {
            event.stopPropagation();
            const d = d3.select(this).datum();
            showPopup(d.name, event.clientX, event.clientY);
          });

      // Set initial radii (k=1 fallback for portrait screens).
      updateHitRadii(1);

      // ── Route label hit circles ──────────────────────────────────────────
      interactionLayer.selectAll(".route-label-hit")
        .data(routeLabels)
        .enter()
        .append("circle")
          .attr("class", "route-label-hit")
          .attr("cx", d => d.cx)
          .attr("cy", d => d.cy)
          .attr("r", 0)
          .on("click", function(event) {
            event.stopPropagation();
            const d = d3.select(this).datum();
            showRoutePopup([d.name], d.color, event.clientX, event.clientY);
          });

      // ── D3 zoom (pan + scroll-wheel zoom) ───────────────────────────────
      const zoom = d3.zoom()
        .scaleExtent([0.3, 12])
        // Keep the map in frame: user can't pan past the SVG artwork edges.
        // The transform (x, y, k) lives in SVG viewBox coords (1191 × 1684).
        .constrain(function(transform) {
          const W = 1191, H = 1684, k = transform.k;
          const mapW = W * k, mapH = H * k;
          // If map larger than viewport: clamp edges; otherwise center the map.
          const x = mapW >= W
            ? Math.max(W - mapW, Math.min(0, transform.x))
            : (W - mapW) / 2;
          const y = mapH >= H
            ? Math.max(H - mapH, Math.min(0, transform.y))
            : (H - mapH) / 2;
          return d3.zoomIdentity.translate(x, y).scale(k);
        })
        .on("zoom", (event) => {
          zoomShell.attr("transform", event.transform);
          updateHitRadii(event.transform.k);
        });

      svg.call(zoom);

      // On landscape screens the portrait map (1191×1684) would letterbox.
      // fitToWidth zooms so the map fills the full screen width, making the
      // top of Germany visible; users pan down to explore the rest.
      function fitToWidth(animated) {
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        if (vw / vh <= 1191 / 1684) return; // portrait: already fills width
        // svgScale = factor "meet" uses for the viewBox → CSS mapping
        const svgS = vh / 1684;
        const k  = vw / (1191 * svgS);
        const tx = -(vw / svgS - 1191) / 2; // shift map left edge to CSS x=0
        const t  = d3.zoomIdentity.translate(tx, 0).scale(k);
        if (animated) {
          svg.transition().duration(700).call(zoom.transform, t);
        } else {
          svg.call(zoom.transform, t);
        }
      }

      fitToWidth(false);

      // Invalidate svgScale cache and refresh radii on resize.
      window.addEventListener("resize", () => {
        _svgScale = null;
        _lastK = null; // force radius recalc
        updateHitRadii(d3.zoomTransform(svg.node()).k);
      });

      // Dismiss popup and clear route highlight on background click.
      svg.on("click", () => { hidePopup(); clearRouteHighlight(); });

      // ── Reset button ─────────────────────────────────────────────────────
      d3.select("#reset-view").on("click", () => {
        hidePopup();
        fitToWidth(true);
      });

      // ── Keyboard navigation ───────────────────────────────────────────────
      // Arrow keys: camera metaphor — key direction = which way the viewport moves.
      // Smooth via rAF loop; no per-keydown transition so there's no lag.
      const keysDown = new Set();

      // Momentum panning — velocity in CSS px/frame, decays when key released.
      const vel = { x: 0, y: 0 };
      const ACCEL   = 1.5;   // CSS px/frame² while key held
      const MAX_SPD = 18;    // CSS px/frame cap (~1080 px/s at 60 fps)
      const FRICTION = 0.78; // multiplier per frame when key released

      (function panLoop() {
        requestAnimationFrame(panLoop);
        const L = keysDown.has("ArrowLeft"),  R = keysDown.has("ArrowRight");
        const U = keysDown.has("ArrowUp"),    D = keysDown.has("ArrowDown");

        // Accelerate in held directions, apply friction on the others.
        if (L) vel.x += ACCEL; else if (R) vel.x -= ACCEL; else vel.x *= FRICTION;
        if (U) vel.y += ACCEL; else if (D) vel.y -= ACCEL; else vel.y *= FRICTION;

        // Clamp to max speed.
        const spd = Math.hypot(vel.x, vel.y);
        if (spd > MAX_SPD) { vel.x = vel.x / spd * MAX_SPD; vel.y = vel.y / spd * MAX_SPD; }

        // Kill negligible drift.
        if (Math.abs(vel.x) < 0.05) vel.x = 0;
        if (Math.abs(vel.y) < 0.05) vel.y = 0;
        if (vel.x === 0 && vel.y === 0) return;

        // Convert CSS px/frame → translateBy units (which adds k·dx to t.x).
        const t  = d3.zoomTransform(svg.node());
        const sc = svgScale();
        svg.call(zoom.translateBy, vel.x / (t.k * sc), vel.y / (t.k * sc));
        // If the constrain function blocked movement in an axis, kill that velocity
        // so the map doesn't judder against the boundary.
        const t2 = d3.zoomTransform(svg.node());
        if (Math.abs(t2.x - t.x) < 0.01) vel.x = 0;
        if (Math.abs(t2.y - t.y) < 0.01) vel.y = 0;
      }());

      window.addEventListener("keydown", (e) => {
        if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
        switch (e.key) {
          case "ArrowLeft": case "ArrowRight":
          case "ArrowUp":   case "ArrowDown":
            e.preventDefault();
            keysDown.add(e.key);
            break;
          case "+": case "=": case "PageUp":
            e.preventDefault();
            svg.transition().duration(220).call(zoom.scaleBy, 1.4);
            break;
          case "-": case "PageDown":
            e.preventDefault();
            svg.transition().duration(220).call(zoom.scaleBy, 1 / 1.4);
            break;
          case "0":
            e.preventDefault();
            hidePopup();
            fitToWidth(true);
            break;
          case "Escape":
            hidePopup();
            break;
        }
      });

      window.addEventListener("keyup", (e) => keysDown.delete(e.key));

    }).catch((err) => {
      console.error("Failed to load map resources:", err);
      document.getElementById("map").textContent =
        "Could not load map. Serve this folder over HTTP: python3 -m http.server 8080";
    });
  </script>
</body>
</html>
